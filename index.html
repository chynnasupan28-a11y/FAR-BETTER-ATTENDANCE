<!DOCTYPE html>
<html>
<head>

<title>Far Better Attendance</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
  font-family: Arial, sans-serif;
  background:#ffffff;
  margin:0;
  padding:20px;
  text-align:center;
}

.container{
  max-width:420px;
  margin:auto;
}

h1{
  font-size:28px;
  margin-bottom:5px;
  color:#222;
}

.subtitle{
  color:#777;
  margin-bottom:20px;
}


.card{

  background:#f8f8f8;
  border-radius:20px;
  padding:20px;
  box-shadow:0 5px 20px rgba(0,0,0,0.08);

}


#reader{

  width:100%;
  margin:auto;

}


#result{

  margin-top:20px;
  font-size:18px;
  font-weight:bold;

}


#devotion{

display:none;
margin-top:20px;

}


button{

width:45%;
padding:15px;
margin:5px;

border:none;
border-radius:12px;

font-size:16px;
font-weight:bold;

cursor:pointer;

}


.yes{

background:#222;
color:white;

}


.no{

background:#ddd;

}


</style>


</head>


<body>


<div class="container">


<h1>
Far Better Attendance
</h1>


<div class="subtitle">
Scan your QR Code to record attendance
</div>



<div class="card">


<div id="reader"></div>


<div id="result">
Ready to Scan...
</div>


<div id="devotion">


<h3>
Did you bring your devotion notebook today?
</h3>


<button class="yes" onclick="sendAttendance('YES')">
YES
</button>


<button class="no" onclick="sendAttendance('NO')">
NO
</button>


</div>


</div>


</div>


<script src="app.js"></script>


</body>

</html>
